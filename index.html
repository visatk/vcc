<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cvv-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVV SHOP</title>
    <script async src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <script
      async
      src="https://telegram.org/js/telegram-widget.js?24"
      data-telegram-login="ElonCCBot"
      data-size="medium"
      data-radius="14"
      data-onauth="onTelegramAuth(user)"
      data-request-access="write"
    ></script>
    <script type="text/javascript">
      function onTelegramAuth(user) {
        alert(
          "Logged in as " +
            user.first_name +
            " " +
            user.last_name +
            " (" +
            user.id +
            (user.username ? ", @" + user.username : "") +
            ")",
        );
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/main.jsx"></script>
  </body>
</html>
